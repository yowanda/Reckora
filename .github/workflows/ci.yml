name: ci

on:
  push:
    branches: [main]
  # Run on every pull request, regardless of base branch, so stacked PRs
  # (e.g. yowanda/A -> yowanda/B -> main) still get the same lint + type +
  # test signal as PRs that target main directly. The original filter only
  # ran CI for PRs whose base branch was ``main``, which silently skipped
  # CI on every intermediate PR in a stack and hid breakages until the
  # whole stack landed.
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-type-test:
    name: lint + type + test (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: set up python
        run: uv python install ${{ matrix.python }}

      - name: sync deps
        run: uv sync --extra dev

      - name: ruff lint
        run: uv run ruff check .

      - name: ruff format check
        run: uv run ruff format --check .

      - name: mypy
        run: uv run mypy

      - name: pytest
        run: uv run pytest -q
